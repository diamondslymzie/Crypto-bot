<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Leverage DEX</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background-color: #1e1e1e;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            width: 80%;
            max-width: 400px;
        }
        h1 { color: #00e676; margin-bottom: 0.5rem; }
        p { color: #b0b0b0; margin-bottom: 2rem; }
        .btn {
            background-color: #00e676;
            color: #121212;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background-color: 0.2s;
            margin-top: 1rem;
        }
        .btn:hover { background-color: #00c465; }
        
        /* Fallback Native Button Styling */
        .wallet-btn {
            background-color: #0088cc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 1.5rem;
        }
        
        #ton-connect-btn {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        #status { margin-top: 1.5rem; font-size: 0.9rem; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h1>Leverage DEX</h1>
    <p>Connect your wallet to swap USDT for TON.</p>
    
    <div id="ton-connect-btn"></div>
    
    <button class="wallet-btn" id="fallback-btn" onclick="openWalletModal()">Connect Wallet</button>
    
    <button class="btn" onclick="triggerSwap()">Swap $1 USDT for TON</button>
    
    <div id="status">Please connect your wallet first.</div>
</div>

<script>
    Telegram.WebApp.expand();

    // Initialize TON Connect UI
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://crypto-bot-fawn.vercel.app/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-btn'
    });

    // Programmatically open modal if user clicks the fallback button
    async function openWalletModal() {
        try {
            await tonConnectUI.openModal();
        } catch (error) {
            console.error("Error opening modal:", error);
            document.getElementById('status').innerText = "Failed to open wallet modal.";
        }
    }

    // Listen for wallet connection changes
    tonConnectUI.onStatusChange(wallet => {
        const statusDiv = document.getElementById('status');
        const fallbackBtn = document.getElementById('fallback-btn');
        
        if (wallet) {
            statusDiv.innerText = "Wallet connected! Ready to swap.";
            statusDiv.style.color = "#00e676";
            fallbackBtn.innerText = "Wallet Connected ✅";
            fallbackBtn.style.backgroundColor = "#2e7d32";
        } else {
            statusDiv.innerText = "Please connect your wallet first.";
            statusDiv.style.color = "#888";
            fallbackBtn.innerText = "Connect Wallet";
            fallbackBtn.style.backgroundColor = "#0088cc";
        }
    });

    async function triggerSwap() {
        const statusDiv = document.getElementById('status');
        
        if (!tonConnectUI.connected) {
            statusDiv.innerText = "Error: Connect your wallet above first!";
            statusDiv.style.color = "#f44336";
            return;
        }

        statusDiv.innerText = "Feature coming soon: Routing payload to DEX...";
        statusDiv.style.color = "#ffeb3b";
        
        // DEX Smart contract execution code will go here!
    }
</script>

</body>
</html>
