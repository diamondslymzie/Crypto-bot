<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Leverage Trading</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background-color: #1e1e1e;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            width: 80%;
            max-width: 400px;
        }
        h1 { color: #00e676; margin-bottom: 0.5rem; }
        p { color: #b0b0b0; margin-bottom: 2rem; }
        .btn {
            background-color: #00e676;
            color: #121212;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background-color: 0.2s;
        }
        .btn:hover { background-color: #00c465; }
        #status { margin-top: 1.5rem; font-size: 0.9rem; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h1>Leverage Bot</h1>
    <p>Tap below to fire a test market order on Bitget.</p>
    
    <button class="btn" onclick="triggerTrade()">Buy BTC ($10 USDT)</button>
    
    <div id="status">Waiting for action...</div>
</div>

<script>
    Telegram.WebApp.expand();

    function triggerTrade() {
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = "Sending signal to Railway...";
        statusDiv.style.color = "#ffeb3b";

        // Your live Railway URL added here
        const railwayUrl = "https://leverage-bot-backend-production.up.railway.app/trade";

        fetch(railwayUrl)
            .then(response => response.json())
            .then(data => {
                if (data.status === "success") {
                    statusDiv.innerText = "Success! " + data.message;
                    statusDiv.style.color = "#00e676";
                } else {
                    statusDiv.innerText = "Error: " + data.message;
                    statusDiv.style.color = "#f44336";
                }
            })
            .catch(error => {
                console.error('Error:', error);
                statusDiv.innerText = "Failed to connect to Railway backend.";
                statusDiv.style.color = "#f44336";
            });
    }
</script>

</body>
</html>
